<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HabitFlow — Daily Habit Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --card: #1a1a24;
      --border: #2a2a3a;
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --accent3: #f59e0b;
      --green: #10b981;
      --red: #ef4444;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --radius: 16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 20% 20%, rgba(124,58,237,0.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 80%, rgba(6,182,212,0.06) 0%, transparent 50%);
      animation: bgPulse 8s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes bgPulse {
      0% { transform: scale(1) rotate(0deg); }
      100% { transform: scale(1.1) rotate(5deg); }
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 48px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }

    .logo span {
      display: inline-block;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .date-badge {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 8px 18px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.5px;
    }

    /* Stats Row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      transition: border-color 0.3s, transform 0.2s;
    }

    .stat-card:hover { border-color: var(--accent); transform: translateY(-2px); }

    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 36px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

    /* Add Habit Form */
    .add-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 32px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .form-group { flex: 1; min-width: 180px; }
    .form-group label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 8px; }

    .form-group input, .form-group select {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
    .form-group select option { background: var(--card); }

    .btn {
      background: linear-gradient(135deg, var(--accent), #5b21b6);
      border: none;
      border-radius: 10px;
      padding: 11px 24px;
      color: white;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    /* Habits list */
    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }

    .habits-list { display: flex; flex-direction: column; gap: 12px; }

    .habit-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      transition: border-color 0.3s, transform 0.2s, box-shadow 0.3s;
      animation: slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .habit-card:hover { border-color: var(--border); transform: translateX(4px); }
    .habit-card.completed { border-color: var(--green); box-shadow: 0 0 0 1px rgba(16,185,129,0.1), inset 0 0 30px rgba(16,185,129,0.03); }

    /* Emoji + color indicator */
    .habit-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .habit-info { flex: 1; min-width: 0; }
    .habit-name {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .habit-meta { font-size: 11px; color: var(--muted); display: flex; gap: 16px; flex-wrap: wrap; }

    /* Streak dots */
    .streak-dots {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.3s, transform 0.2s;
    }

    .dot.filled { background: var(--green); transform: scale(1.2); }
    .dot.today { border: 2px solid var(--accent2); background: transparent; }

    /* Check button */
    .check-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      flex-shrink: 0;
    }

    .check-btn:hover { border-color: var(--green); color: var(--green); transform: scale(1.1); }
    .check-btn.done { background: var(--green); border-color: var(--green); color: white; transform: scale(1.05); }

    .delete-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      padding: 6px;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover { color: var(--red); background: rgba(239,68,68,0.1); }

    /* Progress bar */
    .progress-bar-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 32px;
    }

    .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .progress-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; }
    .progress-pct { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; color: var(--accent2); }

    .progress-track {
      background: var(--border);
      border-radius: 100px;
      height: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 100px;
      transition: width 0.6s cubic-bezier(0.34, 1.2, 0.64, 1);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { font-size: 14px; line-height: 1.7; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: var(--green);
      color: white;
      padding: 12px 20px;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 13px;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 999;
    }

    .toast.show { transform: translateY(0); opacity: 1; }

    /* Streak fire indicator */
    .streak-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(245,158,11,0.15);
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 100px;
      padding: 2px 10px;
      font-size: 11px;
      color: var(--accent3);
      font-weight: 500;
    }

    /* Category colors */
    .cat-health  { background: rgba(16,185,129,0.15); }
    .cat-work    { background: rgba(124,58,237,0.15); }
    .cat-mind    { background: rgba(6,182,212,0.15); }
    .cat-fitness { background: rgba(245,158,11,0.15); }
    .cat-social  { background: rgba(239,68,68,0.15); }

    @media (max-width: 600px) {
      .stats-row { grid-template-columns: repeat(3, 1fr); }
      .stat-value { font-size: 24px; }
      .add-form { flex-direction: column; }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">Habit<span>Flow</span></div>
    <div class="date-badge" id="dateBadge">Today</div>
  </header>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-value" id="statTotal" style="color: var(--accent)">0</div>
      <div class="stat-label">Total Habits</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statDone" style="color: var(--green)">0</div>
      <div class="stat-label">Done Today</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statStreak" style="color: var(--accent3)">0</div>
      <div class="stat-label">Best Streak 🔥</div>
    </div>
  </div>

  <!-- Daily progress -->
  <div class="progress-bar-wrap">
    <div class="progress-header">
      <span class="progress-title">Today's Progress</span>
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <!-- Add habit form -->
  <div class="add-form">
    <div class="form-group">
      <label>Habit Name</label>
      <input type="text" id="habitName" placeholder="e.g. Drink 2L water" maxlength="40"/>
    </div>
    <div class="form-group" style="max-width:140px;">
      <label>Category</label>
      <select id="habitCat">
        <option value="health">💚 Health</option>
        <option value="work">💜 Work</option>
        <option value="mind">💙 Mind</option>
        <option value="fitness">🧡 Fitness</option>
        <option value="social">❤️ Social</option>
      </select>
    </div>
    <div class="form-group" style="max-width:120px;">
      <label>Goal / day</label>
      <input type="number" id="habitGoal" value="1" min="1" max="99"/>
    </div>
    <button class="btn" onclick="addHabit()">+ Add Habit</button>
  </div>

  <!-- Habits -->
  <div class="section-title">Your Habits</div>
  <div class="habits-list" id="habitsList"></div>
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">🌱</div>
    <p>No habits yet.<br/>Add your first habit above to get started!</p>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">✅ Habit completed!</div>

<script>
  const EMOJIS = { health:'💚', work:'💜', mind:'💙', fitness:'🧡', social:'❤️' };
  const today = new Date().toISOString().split('T')[0];

  // Set date badge
  document.getElementById('dateBadge').textContent =
    new Date().toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' });

  let habits = JSON.parse(localStorage.getItem('hf_habits') || '[]');

  function save() { localStorage.setItem('hf_habits', JSON.stringify(habits)); }

  function addHabit() {
    const name = document.getElementById('habitName').value.trim();
    const cat  = document.getElementById('habitCat').value;
    const goal = parseInt(document.getElementById('habitGoal').value) || 1;
    if (!name) { document.getElementById('habitName').focus(); return; }

    habits.push({
      id: Date.now(),
      name,
      cat,
      goal,
      completions: {},  // date -> count
      streak: 0,
      created: today
    });
    save();
    document.getElementById('habitName').value = '';
    render();
  }

  function toggleHabit(id) {
    const h = habits.find(x => x.id === id);
    if (!h) return;
    if (!h.completions[today]) h.completions[today] = 0;
    if (h.completions[today] < h.goal) {
      h.completions[today]++;
      if (h.completions[today] === h.goal) {
        // calculate streak
        let streak = 0;
        let d = new Date(today);
        while (true) {
          const ds = d.toISOString().split('T')[0];
          const c = h.completions[ds] || 0;
          const g = h.goal;
          if (c >= g) { streak++; d.setDate(d.getDate() - 1); }
          else break;
        }
        h.streak = Math.max(h.streak || 0, streak);
        showToast('🔥 ' + h.name + ' done!');
      }
    } else {
      h.completions[today] = 0;
    }
    save();
    render();
  }

  function deleteHabit(id) {
    habits = habits.filter(x => x.id !== id);
    save();
    render();
  }

  function getStreak(h) {
    let streak = 0;
    let d = new Date(today);
    while (true) {
      const ds = d.toISOString().split('T')[0];
      if ((h.completions[ds] || 0) >= h.goal) { streak++; d.setDate(d.getDate() - 1); }
      else break;
    }
    return streak;
  }

  function render() {
    const list = document.getElementById('habitsList');
    const empty = document.getElementById('emptyState');
    list.innerHTML = '';

    const total = habits.length;
    const done  = habits.filter(h => (h.completions[today] || 0) >= h.goal).length;
    const bestStreak = habits.reduce((m, h) => Math.max(m, h.streak || 0), 0);

    document.getElementById('statTotal').textContent = total;
    document.getElementById('statDone').textContent  = done;
    document.getElementById('statStreak').textContent = bestStreak;

    const pct = total ? Math.round(done / total * 100) : 0;
    document.getElementById('progressPct').textContent = pct + '%';
    document.getElementById('progressFill').style.width = pct + '%';

    empty.style.display = total ? 'none' : 'block';

    habits.forEach(h => {
      const count = h.completions[today] || 0;
      const completed = count >= h.goal;
      const streak = getStreak(h);

      // Last 7 days dots
      let dots = '';
      for (let i = 6; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        const ds = d.toISOString().split('T')[0];
        const c = h.completions[ds] || 0;
        const cl = i === 0 ? (c >= h.goal ? 'filled' : 'today') : (c >= h.goal ? 'filled' : '');
        dots += `<div class="dot ${cl}" title="${ds}"></div>`;
      }

      const card = document.createElement('div');
      card.className = 'habit-card' + (completed ? ' completed' : '');
      card.innerHTML = `
        <div class="habit-icon cat-${h.cat}">${EMOJIS[h.cat]}</div>
        <div class="habit-info">
          <div class="habit-name">${h.name}</div>
          <div class="habit-meta">
            <span>${count}/${h.goal} today</span>
            ${streak > 0 ? `<span class="streak-badge">🔥 ${streak} day streak</span>` : ''}
          </div>
          <div class="streak-dots" style="margin-top:10px">${dots}</div>
        </div>
        <button class="check-btn ${completed ? 'done' : ''}" onclick="toggleHabit(${h.id})">
          ${completed ? '✓' : '○'}
        </button>
        <button class="delete-btn" onclick="deleteHabit(${h.id})" title="Delete">✕</button>
      `;
      list.appendChild(card);
    });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // Enter key
  document.getElementById('habitName').addEventListener('keydown', e => {
    if (e.key === 'Enter') addHabit();
  });

  // Seed sample habits on first load
  if (!habits.length) {
    habits = [
      { id: 1, name: 'Drink 2L of water', cat: 'health', goal: 1, completions: {}, streak: 0, created: today },
      { id: 2, name: 'Morning meditation', cat: 'mind',   goal: 1, completions: {}, streak: 0, created: today },
      { id: 3, name: '30 min exercise',   cat: 'fitness', goal: 1, completions: {}, streak: 0, created: today },
    ];
    save();
  }

  render();
</script>
</body>
</html>
